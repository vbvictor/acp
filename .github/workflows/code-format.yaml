name: Code formatter

on:
  push:
    branches:
    - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-black-formatter:
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    name: python-formatter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: psf/black@6305bf1ae645ab7541be4f5028a86239316178eb # 26.1.0
