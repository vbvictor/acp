name: Shell lint

on:
  push:
    branches:
      - main
    paths:
      - '**/*.sh'
      - '.github/workflows/*.yaml'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.sh'
      - '.github/workflows/*.yaml'

permissions:
  contents: read

jobs:
  shell-lint:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    name: shellcheck-lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run ShellCheck
        run: shellcheck tests/completions/test_completions.sh
