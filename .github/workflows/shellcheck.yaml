name: Shell lint

on:
  push:
    branches:
      - main
    paths:
      - '**/*.sh'
      - '.github/workflows/*.yaml'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.sh'
      - '.github/workflows/*.yaml'

permissions:
  contents: read

jobs:
  shell-lint:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    name: shellcheck-lint
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run ShellCheck
        run: shellcheck tests/completions/test_completions.sh
