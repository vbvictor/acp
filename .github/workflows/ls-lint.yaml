name: Check file naming style

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ls-lint:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    name: ls-lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ls-lint/action@02e380fe8733d499cbfc9e22276de5085508a5bd # v2
