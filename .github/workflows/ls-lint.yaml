name: Check file naming style

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ls-lint:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    name: ls-lint
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ls-lint/action@02e380fe8733d499cbfc9e22276de5085508a5bd # v2
